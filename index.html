<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiche d'Inscription</title>
    <style>
        /* Réinitialisation de base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            /* Dégradé de fond moderne et doux */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            /* Ombre plus diffuse et moderne */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 20px 48px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            transition: transform 0.3s ease;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        input[type="text"], 
        input[type="email"], 
        input[type="tel"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            color: #2d3748;
            background-color: #f8fafc;
            transition: all 0.3s ease;
        }

        /* Effet au survol des champs */
        input:hover {
            border-color: #cbd5e1;
        }

        /* Effet dynamique quand l'utilisateur clique dans le champ */
        input:focus {
            border-color: #4CAF50;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.15);
            outline: none;
        }

        /* Changement de couleur du label quand le champ est actif */
        .form-group:focus-within label {
            color: #4CAF50;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(76, 175, 80, 0.2);
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        /* Animations du bouton */
        button:hover {
            background-color: #439a46;
            box-shadow: 0 6px 12px rgba(76, 175, 80, 0.3);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 4px rgba(76, 175, 80, 0.2);
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Fiche d'Inscription</h2>
    <p class="subtitle">Veuillez remplir vos informations ci-dessous</p>
    
    <form action="https://formsubmit.co/your@email.com" method="POST">
    
    <input type="hidden" name="_captcha" value="false"> 
    
    <input type="hidden" name="_next" value="https://Bouktech.com/merci.html"> 
    
    <div class="form-group">
        <label for="nom">Nom complet</label>
        <input type="text" id="nom" name="Nom" placeholder="ce champ est obligatoire required autocomplete="name">
    </div>
    
    <div class="form-group">
        <label for="email">Adresse Email</label>
        <input type="email" id="email" name="Email" placeholder="Ex: jean.dupont@mail.com" required autocomplete="email">
    </div>
    
    <div class="form-group">
        <label for="telephone">Numéro de Téléphone</label>
        <input type="tel" id="telephone" name="Téléphone" placeholder="Ex: +33 6 12 34 56 78" required autocomplete="tel">
    </div>
    
    <button type="submit">S'inscrire</button>
</form>
</div>

</body>
</html>
